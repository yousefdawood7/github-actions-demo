name: Building Block
on: [push, workflow_dispatch]

jobs: 
  successful-job:
    runs-on: ubuntu-latest
    steps:
      - name: successful step
        run: echo hello world
  failed-job:
    runs-on: ubuntu-latest
    steps: 
      - name: failed exit code
        run: |
          echo Bye world
          exit 0
      - name: another step
        run: echo Bye bye